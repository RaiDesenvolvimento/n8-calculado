name: FRONT-DEPLOY

on:
  push:
    branches: [main]

jobs:
  front-deploy:
    runs-on: [self-hosted, Linux, x64]
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: install yarn
        run: npm i -g yarn

      - name: yarn install
        run: yarn install

      - name: install pm2
        run: npm install -g pm2

      - name: start front with PM2
        run: |
          pm2 start npm --name "front-app" -- run dev
          pm2 save
          pm2 list